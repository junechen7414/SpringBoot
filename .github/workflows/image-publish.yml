name: Build and Push Backend Image

on:
  push:
    branches: [ "main", "Monitoring" ]
  pull_request:
    branches: [ "main", "Monitoring" ]
  workflow_dispatch:      # 允許手動從 GitHub 介面觸發

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 必備：允許推送到 ghcr.io

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle # 自動快取 ~/.gradle，加速依賴下載

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests (Gate)
        # 排除 SanityTest，只跑 97% 的單元測試。測試失敗則停止後續 Build。
        run: ./gradlew test -Djunit.platform.exclude.tags=SanityTest --no-daemon

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        # 啟用 Buildx 以支援 type=gha 快取功能
        uses: docker/setup-buildx-action@v3

      - name: Extract Metadata (Tags/Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 極速快取設定：從 GitHub Actions 內部的快取空間讀取與寫入 Layer
          cache-from: type=gha
          cache-to: type=gha,mode=max