name: Build and Push Backend Image

on:
  push:
    branches: [ "main"]
  workflow_dispatch:      # 允許手動從 GitHub 介面觸發

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 必備：允許推送到 ghcr.io

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle # 自動快取 ~/.gradle，加速依賴下載

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests (Gate)
        # 排除 SanityTest，只跑 97% 的單元測試。測試失敗則停止後續 Build。
        run: ./gradlew test -Djunit.platform.exclude.tags=SanityTest --no-daemon

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        # 啟用 Buildx 以支援後續步驟中 type=gha 快取功能
        uses: docker/setup-buildx-action@v3

      - name: Extract Metadata (Tags/Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # 使用 docker/metadata-action 產生的 tags 和 labels，確保版本管理和追蹤資訊完整
          # meta-action 的id為 "meta"，透過參數的方式帶入上一步的設定
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 去 GitHub Actions 的快取找是否有 Layer 的快取存在
          # 嘗試從兩個地方找快取：
          # 1. 目前分支的專屬快取
          # 2. main 分支的基準快取 (當做 fallback)
          cache-from: |
            type=gha,scope=${{ github.ref_name }}
            type=gha,scope=main
          # 把這次的 Layer 存到 GitHub Actions 的快取空間，只更新目前分支的快取
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}