spring:
  datasource:
    url: jdbc:oracle:thin:@//${ORACLE_DB_HOST:localhost}:1521/FREEPDB1
    username: ${ORACLE_DEV_USERNAME}
    password: ${ORACLE_DEV_PASSWORD}
    driver-class-name: oracle.jdbc.driver.OracleDriver
    hikari:
      maximum-pool-size: 500      # 支援高並發測試
      minimum-idle: 100           # 保持 100 個空閒連接
      connection-timeout: 5000    # 5 秒連接超時
      idle-timeout: 300000        # 5 分鐘空閒超時
      max-lifetime: 1800000       # 30 分鐘最大生命週期
  jpa:
    hibernate:
      ddl-auto: validate  
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
    show-sql: true  # 開發環境顯示 SQL 語句，方便除錯
  flyway:
    enabled: true  # 使用 Flyway 進行資料庫遷移版本控制

logging:
  level:
    com.ibm.demo: DEBUG

management:
  otlp:
    metrics:
      export:
        url: http://alloy:4318/v1/metrics
        enabled: true
        step: 10s
  metrics:
    tags:
      application: ${spring.application.name}
