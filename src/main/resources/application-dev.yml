spring:
  datasource:
    url: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
    username: ${ORACLE_DEV_USERNAME}
    password: ${ORACLE_DEV_PASSWORD}
    driver-class-name: oracle.jdbc.driver.OracleDriver
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: update  # 改為 update，保留資料避免每次重啟都清空
    show-sql: true  # 開發環境顯示 SQL 語句，方便除錯

logging:
  level:
    com.ibm.demo: DEBUG

management:
  otlp:
    metrics:
      export:
        url: http://alloy:4318/v1/metrics
        enabled: true
        step: 10s
  metrics:
    tags:
      application: ${spring.application.name}
