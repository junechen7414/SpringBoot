spring.main.web-application-type=servlet
server.port=8787
# Oracle Database Connection Settings (from jpa project)
spring.datasource.url=jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
spring.datasource.username=${ORACLE_USERNAME}
spring.datasource.password=${ORACLE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver

# HikariCP Connection Pool Settings
# Connection timeout in milliseconds
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=20

logging.level.com.example.demo=INFO

# Hibernate DDL Auto Configuration (from jpa project), none, update, create, create-drop
spring.jpa.hibernate.ddl-auto=create-drop

# Enable virtual threads for better concurrency (requires Java 19+)
spring.threads.virtual.enabled=true

# Expose specific Actuator endpoints for health, info, metrics, prometheus
# 開啟所有監控點
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# 啟用 Prometheus 格式支援
management.endpoint.prometheus.access=READ_ONLY
management.endpoint.health.show-details=always

# 2. 讓指標帶有應用程式名稱（在 Grafana 篩選時非常有用）
spring.application.name=demo
management.otlp.metrics.export.url=http://alloy:4318/v1/metrics
# 開啟 OTLP 指標導出
management.otlp.metrics.export.enabled=true
management.otlp.metrics.export.step=10s

# 3. 讓 Micrometer 標籤更豐富
management.metrics.tags.application=${spring.application.name}

# Base URL for external services
app.base-url=http://localhost:${server.port}

# HTTP Client Connection Pool and Timeout Settings
#milliseconds
http.client.max-total=200
http.client.default-max-per-route=150
#seconds
http.client.connection-request-timeout=4
http.client.response-timeout=6
http.client.evict-idle-connections-period=30