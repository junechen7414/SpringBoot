spring:
  profiles:
    active: dev
  application:
    name: demo
  main:
    web-application-type: servlet
  threads:
    virtual:
      enabled: true

server:
  port: 8787

logging:
  level:
    com.example.demo: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      access: READ_ONLY
    health:
      show-details: always

app:
  base-url: http://localhost:${server.port}
  database:
    concurrency:
      default-limit: 15
      limits:
        OrderService: 18

http:
  client:
    max-total: 200
    default-max-per-route: 150
    connection-request-timeout: 4s
    response-timeout: 5s
    evict-idle-connections-period: 30s
