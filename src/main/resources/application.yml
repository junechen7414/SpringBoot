# ============================================================================
# Spring Profile Configuration Strategy
# ============================================================================
# This application uses Spring profiles to manage environment-specific settings.
#
# Available Profiles:
# -------------------
# 1. 'dev' (Development) - Default profile for local development
#    - Uses Oracle database with credentials from environment variables
#    - Enables DEBUG logging for application code
#    - Configures metrics export to Alloy/Prometheus
#    - Database schema is recreated on each startup (ddl-auto: create-drop)
#    - See: application-dev.yml
#
# 2. 'unit-test' (Unit Testing) - Used for automated unit testing
#    - Configured in src/test/resources/application-unit-test.yml
#    - Uses test-specific database and settings
#
# 3. 'openapi' (OpenAPI Documentation Generation)
#    - Lightweight profile for generating API documentation during build
#    - Uses H2 in-memory database to avoid external dependencies
#    - Disables unnecessary features for faster startup
#    - See: application-openapi.yml
#
# 4. 'e2e' (End-to-End Testing)
#    - Used for end-to-end and Playwright-based test scenarios
#    - Configured in src/test/resources/application-e2e.yml
#    - Uses test-specific settings for E2E execution
#
# Overriding the Default Profile:
# --------------------------------
# The default profile is set to 'dev' for convenience during development.
# To use a different profile in production or other environments:
#
# Option 1: Environment Variable (Recommended for production)
#   export SPRING_PROFILES_ACTIVE=prod
#   or set SPRING_PROFILES_ACTIVE=prod (Windows)
#
# Option 2: Command Line Argument
#   java -jar app.jar --spring.profiles.active=prod
#
# Option 3: System Property
#   java -Dspring.profiles.active=prod -jar app.jar
#
# Migration Notes:
# ----------------
# - Datasource configuration has been moved from application.yml to profile-specific files
# - Existing deployments should set SPRING_PROFILES_ACTIVE environment variable
# - Production environments should NOT use 'dev' profile (configured for local development)
# ============================================================================

spring:
  profiles:
    active: dev
  application:
    name: demo
  main:
    web-application-type: servlet
  threads:
    virtual:
      enabled: true

server:
  port: 8787

logging:
  level:
    com.ibm.demo: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      access: READ_ONLY
    health:
      show-details: always

app:
  base-url: http://localhost:${server.port}

http:
  client:
    max-total: 200
    default-max-per-route: 150
    connection-request-timeout: 4s
    response-timeout: 5s
    evict-idle-connections-period: 30s

# Resilience4j 配置 - 替換原有的自定義 Semaphore 限流機制
# 使用 Semaphore-based Bulkhead 實現 fail-fast 行為
resilience4j:
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 15
        max-wait-duration: 0ms  # fail-fast: 不等待，立即拒絕
    instances:
      OrderService:
        base-config: default
        max-concurrent-calls: 18
      AccountService:
        base-config: default
      ProductService:
        base-config: default
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      OrderService:
        base-config: default
      AccountService:
        base-config: default
      ProductService:
        base-config: default
