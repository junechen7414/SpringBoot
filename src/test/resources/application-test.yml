# Unit Test Profile - Uses H2 in-memory database
# This profile is used for fast unit tests without external dependencies
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:  # Empty password is intentional for H2's default 'sa' user configuration
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: false
    clean-disabled: false
    locations: classpath:db/migration

management:
  otlp:
    metrics:
      export:
        enabled: false
  metrics:
    tags:
      application: ${spring.application.name}