services:
  # Service Name: app (Spring Boot Application)
  app:
    # Build Spring Boot application image using Dockerfile in the same directory as docker-compose.yml
    build: .
    # Container name for easy identification in commands like podman ps, not used for network communication
    container_name: spring-boot-app
    ports:
      - "8787:8787" # Access via localhost:8787 from host machine
    environment:
      # Internal communication: use service name 'oracle-db' instead of localhost
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@oracle-db:1521/FREEPDB1
      - SPRING_DATASOURCE_USERNAME=${ORACLE_DEV_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${ORACLE_DEV_PASSWORD}
    networks:
      - backend-net
    depends_on:
      oracle-db:
        condition: service_healthy # Critical: App starts only when DB is healthy
      alloy:
        condition: service_started
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-db
    ports:
      - "1521:1521"
    environment:
      # Oracle DB environment variables as per official documentation
      # Oracle startup script (runOracle.sh) uses default naming: SID=FREE, PDB=FREEPDB1
      - ORACLE_SID=FREE
      - ORACLE_PDB=FREEPDB1
      - ORACLE_USERNAME=${ORACLE_DEV_USERNAME}
      - ORACLE_PASSWORD=${ORACLE_DEV_PASSWORD}
      # Environment variables passed to custom initialization scripts
      - ORACLE_DEV_USERNAME=${ORACLE_DEV_USERNAME}
      - ORACLE_DEV_PASSWORD=${ORACLE_DEV_PASSWORD}
    volumes:
      - oracle-data:/opt/oracle/oradata
      # Startup scripts directory
      - ./init-scripts:/opt/oracle/scripts/startup
      # Template files directory (mounted to custom location)
      - ./init-scripts-template:/opt/oracle/template
    healthcheck:
      # Check if PDB is ready using sqlplus
      test: [ "CMD-SHELL", "sqlplus -L ${ORACLE_DEV_USERNAME}/${ORACLE_DEV_PASSWORD}@FREEPDB1 <<<'exit;'" ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - backend-net

  # Grafana Alloy (modern collector replacing legacy Prometheus Agent)
  alloy:
    image: grafana/alloy:latest
    container_name: grafana-alloy
    # Mount current directory to /etc/alloy for configuration file access
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy
      - alloy-data:/var/lib/alloy/data
    # Run Alloy with specified storage path and configuration file
    command: run --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    ports:
      - "4318:4318" # Port for receiving OTLP data
    # Alloy sends data to Prometheus
    networks:
      - backend-net
      - monitor-net
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    # Run Prometheus with configuration file and enable remote write receiver for Grafana Alloy data
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-remote-write-receiver' # Enable remote write receiver
    ports:
      - "9090:9090"
    networks:
      - monitor-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitor-net
    restart: unless-stopped
    # Allow anonymous access to Grafana with Admin role for viewing and managing data
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
networks:
  # Network separation: app only pushes data to alloy, no direct access to prometheus
  backend-net:
    driver: bridge
  # Internal communication between monitoring tools
  monitor-net:
    driver: bridge

volumes:
  # Named volumes: ensure data (dashboards, metrics) persists after container restarts
  alloy-data:
  prometheus-data:
  grafana-data:
  oracle-data:
